profile: local_mac_fast_reaction_lite
environment: development
gpu: apple_silicon
runtime:
  project_root: .
  log_level: INFO
  trace_enabled: true
  mock_drivers: false
  fast_path_budget_ms: 24
  fast_path_pending_limit: 16
  max_scenes_per_cycle: 2
  async_perception_enabled: true
  async_perception_queue_limit: 1
  async_perception_result_max_age_ms: 160
  async_perception_result_max_frame_lag: 3
  async_executor_enabled: true
  async_executor_queue_limit: 8
  behavior_tick_enabled: false
  behavior_tick_max_nodes: 1
  async_capture_enabled: false
  async_capture_queue_limit: 1
  enabled_pipelines:
    - face
    - audio
    - motion
