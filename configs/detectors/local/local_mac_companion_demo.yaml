# Local companion demo profile.
# Prefer InsightFace for local face registration/recognition, with MediaPipe fallback.

detectors:
  face:
    detector_type: "insightface"
    enabled: true
    sample_rate_hz: 6
    runtime_budget_ms: 18
    model_path: "~/.insightface/models"
    fallback_model_path: "models/mediapipe/face_landmarker.task"
    config:
      model_name: "buffalo_l"
      model_root: "~/.insightface/models"
      providers: ["CPUExecutionProvider"]
      gpu_device: -1
      require_gpu: false
      recognition_threshold: 0.55
      det_thresh: 0.45
      det_size: [640, 640]

  gesture:
    detector_type: "mediapipe_gesture"
    enabled: true
    sample_rate_hz: 5
    runtime_budget_ms: 12
    model_path: "models/mediapipe/gesture_recognizer.task"
    config:
      use_gpu: false
      require_gpu: false
      num_hands: 2
      min_detection_confidence: 0.45
      min_presence_confidence: 0.45
      min_tracking_confidence: 0.45

  gaze:
    detector_type: "mediapipe_iris"
    enabled: true
    sample_rate_hz: 4
    runtime_budget_ms: 12
    model_path: "models/mediapipe/face_landmarker.task"
    config:
      use_gpu: false
      require_gpu: false
      min_detection_confidence: 0.45
      min_presence_confidence: 0.45
      min_tracking_confidence: 0.45
      max_faces: 2

  audio:
    detector_type: "panns_whisper"
    enabled: true
    sample_rate_hz: 2
    runtime_budget_ms: 18
    model_path: "models/audio/panns/Cnn14_mAP=0.431.pth"
    config:
      sample_rate: 16000
      analysis_window_s: 1.5
      buffer_window_s: 4.0
      panns_device: "auto"
      panns_checkpoint_path: "models/audio/panns/Cnn14_mAP=0.431.pth"
      panns_labels_path: "models/audio/panns/class_labels_indices.csv"
      panns_confidence_threshold: 0.28
      panns_top_k: 5
      classification_cooldown_s: 0.75
      vad_enabled: true
      vad_threshold: 0.5
      vad_min_speech_duration_ms: 180
      vad_min_silence_duration_ms: 120
      whisper_enabled: false
      whisper_model_variant: "tiny"
      whisper_device: "cpu"
      whisper_compute_type: "int8"
      whisper_beam_size: 1
      whisper_min_text_length: 2
      whisper_min_confidence: 0.2
      speech_cooldown_s: 1.75

  motion:
    detector_type: "opencv"
    enabled: true
    sample_rate_hz: 6
    runtime_budget_ms: 12
    model_path: "builtin:robot_life/opencv_motion_v1"
    config:
      require_gpu: false
      pixel_threshold: 22
      blur_kernel: 5
      motion_scale: 0.5
      min_area_ratio: 0.03
      motion_cooldown_sec: 0.45

detector_global:
  input_source: "camera"
  resolution: [640, 360]
  frame_rate: 30
  enable_gpu: false
  gpu_device_id: -1
  fast_cycle_budget_ms: 36
  fast_parallel_workers: 4
  microphone_prefer_builtin: true
  microphone_sample_rate: 16000
  microphone_channels: 1
  microphone_blocksize: 2048
  microphone_max_buffer_packets: 24
