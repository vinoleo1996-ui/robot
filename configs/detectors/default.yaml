# Detector Configuration
# Defines detector implementations, model paths, and parameters

detectors:
  # Face Recognition Pipeline
  face:
    detector_type: "insightface"
    enabled: true
    model_path: "~/.insightface/models/buffalo_l_legacy"
    fallback_model_path: "models/mediapipe/face_landmarker.task"
    config:
      model_name: "buffalo_l_legacy"  # InsightFace 0.2.x-compatible model pack
      model_root: "~/.insightface/models"
      providers: ["CoreMLExecutionProvider", "CUDAExecutionProvider", "CPUExecutionProvider"]
      require_gpu: false
      det_thresh: 0.5              # Detection threshold
      rec_batch_size: 32           # Recognition batch size
  
  # Gesture Recognition Pipeline
  gesture:
    detector_type: "mediapipe_gesture"
    enabled: true
    model_path: "models/mediapipe/gesture_recognizer.task"
    config:
      use_gpu: false
      require_gpu: false
      num_hands: 2                 # Max hands to detect
      min_detection_confidence: 0.5
      min_tracking_confidence: 0.5
  
  # Gaze Detection Pipeline
  gaze:
    detector_type: "mediapipe_iris"
    enabled: true
    model_path: "models/mediapipe/face_landmarker.task"
    config:
      use_gpu: false
      require_gpu: false
      min_detection_confidence: 0.5
      max_eyes_to_detect: 2
  
  # Audio Event Detection Pipeline
  audio:
    detector_type: "rms_audio"
    enabled: true
    model_path: "builtin:robot_life/rms_loud_sound_v1"
    config:
      rms_threshold: 0.15
      energy_threshold_db: -24
      cooldown_s: 0.5
      sample_rate: 16000           # Audio sample rate
  
  # Motion Detection Pipeline
  motion:
    detector_type: "yolo"
    enabled: true
    model_path: "models/yolo/yolov8n.pt"
    config:
      providers: ["CoreMLExecutionProvider", "CUDAExecutionProvider", "CPUExecutionProvider"]
      require_gpu: false
      allow_cuda_fallback: true
      device: "mps"
      conf_threshold: 0.5          # Confidence threshold
      iou_threshold: 0.45          # IoU threshold for NMS
      classes: [0, 15, 16]         # Person, Cat, Dog

# Global detector settings
detector_global:
  input_source: "camera"           # Primary input source
  resolution: [1280, 720]          # Camera resolution (optional)
  frame_rate: 30                   # Target frame rate
  enable_gpu: true                 # Use GPU if available
  gpu_device_id: 0                 # Which GPU device to use
