# 4090 runtime detector profile (no placeholder model paths).
detectors:
  face:
    detector_type: "insightface"
    enabled: true
    model_path: "~/.insightface/models/buffalo_l_legacy"
    fallback_model_path: "models/mediapipe/face_landmarker.task"
    config:
      model_name: "buffalo_l_legacy"
      model_root: "~/.insightface/models"
      providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
      require_gpu: true
      det_thresh: 0.5
      rec_batch_size: 32

  gesture:
    detector_type: "mediapipe_gesture"
    enabled: true
    model_path: "models/mediapipe/gesture_recognizer.task"
    config:
      use_gpu: true
      require_gpu: true
      num_hands: 2
      min_detection_confidence: 0.5
      min_tracking_confidence: 0.5

  gaze:
    detector_type: "mediapipe_iris"
    enabled: true
    model_path: "models/mediapipe/face_landmarker.task"
    config:
      use_gpu: true
      require_gpu: true
      min_detection_confidence: 0.5
      max_eyes_to_detect: 2

  audio:
    detector_type: "rms_audio"
    enabled: true
    model_path: "builtin:robot_life/rms_loud_sound_v1"
    config:
      sample_rate: 16000
      frame_length: 0.96
      classes_to_detect:
        - "Speech"
        - "Alarm"
        - "Crying baby"
        - "Shouting"
      energy_threshold_db: -24

  motion:
    detector_type: "yolo"
    enabled: true
    model_path: "models/yolo/yolov8n.pt"
    config:
      providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
      require_gpu: true
      allow_cuda_fallback: false
      device: "cuda:0"
      conf_threshold: 0.5
      iou_threshold: 0.45
      classes: [0]

detector_global:
  input_source: "camera"
  resolution: [1280, 720]
  frame_rate: 30
  enable_gpu: true
  gpu_device_id: 0
