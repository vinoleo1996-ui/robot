# 4090 fast-reaction baseline profile.
# Goal: converge all five fast pipelines first, prioritize low jitter and full functional coverage.
detectors:
  face:
    detector_type: "insightface"
    enabled: true
    sample_rate_hz: 8
    runtime_budget_ms: 12
    model_path: "~/.insightface/models/buffalo_l_legacy"
    fallback_model_path: "models/mediapipe/face_landmarker.task"
    config:
      model_name: "buffalo_l_legacy"
      model_root: "~/.insightface/models"
      providers: ["CUDAExecutionProvider", "CPUExecutionProvider"]
      require_gpu: true
      det_thresh: 0.55
      det_size: [640, 640]
      rec_batch_size: 16

  gesture:
    detector_type: "mediapipe_gesture"
    enabled: true
    sample_rate_hz: 8
    runtime_budget_ms: 8
    model_path: "models/mediapipe/gesture_recognizer.task"
    config:
      use_gpu: false
      require_gpu: false
      num_hands: 2
      min_detection_confidence: 0.45
      min_presence_confidence: 0.45
      min_tracking_confidence: 0.45

  gaze:
    detector_type: "mediapipe_iris"
    enabled: true
    sample_rate_hz: 8
    runtime_budget_ms: 8
    model_path: "models/mediapipe/face_landmarker.task"
    config:
      use_gpu: false
      require_gpu: false
      min_detection_confidence: 0.45
      min_presence_confidence: 0.45
      min_tracking_confidence: 0.45
      max_faces: 1

  audio:
    detector_type: "rms_audio"
    enabled: true
    sample_rate_hz: 10
    runtime_budget_ms: 4
    model_path: "builtin:robot_life/rms_loud_sound_v1"
    config:
      sample_rate: 16000
      frame_length: 0.5
      rms_threshold: 0.15
      energy_threshold_db: -24
      cooldown_s: 0.4

  motion:
    detector_type: "opencv"
    enabled: true
    sample_rate_hz: 12
    runtime_budget_ms: 8
    model_path: "builtin:robot_life/opencv_motion_v1"
    config:
      require_gpu: false
      pixel_threshold: 25
      blur_kernel: 5
      min_area_ratio: 0.02
      motion_cooldown_sec: 0.4

detector_global:
  input_source: "camera"
  resolution: [960, 540]
  frame_rate: 30
  enable_gpu: true
  gpu_device_id: 0
  fast_cycle_budget_ms: 24
